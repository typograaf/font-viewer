<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Font Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #000;
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    #typeface-select {
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      font-size: 20px;
      border: none;
      outline: none;
      background: #fff;
      border-radius: 12px;
      padding: 4px 10px 4px 0;
      color: #000;
      cursor: pointer;
      width: 100%;
    }

    /* ── Canvas ── */
    #canvas {
      position: fixed;
      inset: 0;
      padding: 60px 80px;
      outline: none;
      white-space: pre-wrap;
      word-break: break-word;
      caret-color: #000;
      overflow-y: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    #canvas:empty::before {
      content: attr(data-placeholder);
      color: #ccc;
      pointer-events: none;
    }

    /* ── Control panel ── */
    #controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 24px 24px;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    #controls .panel {
      pointer-events: all;
    }

    .panel {
      background: #F0F000;
      border-radius: 14px;
      padding: 24px;
      width: 480px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slider-row {
      display: grid;
      grid-template-columns: 90px 1fr 72px;
      align-items: center;
      gap: 12px;
    }

    .slider-label {
      font-size: 20px;
      font-weight: 400;
      color: #000;
      white-space: nowrap;
    }

    /* Custom range slider */
    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 2px;
      background: #000;
      outline: none;
      border: none;
      cursor: pointer;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #000;
      cursor: pointer;
    }

    .slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #000;
      border: none;
      cursor: pointer;
    }

    .slider-value {
      font-size: 20px;
      color: #000;
      text-align: right;
      white-space: nowrap;
    }

    .panel-top {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding-bottom: 10px;
    }

    #pangram-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      opacity: 1;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      flex-shrink: 0;
    }

    #pangram-btn svg {
      width: 12px;
      height: auto;
    }

    #pangram-btn:hover { opacity: 0.6; }
  </style>
</head>
<body>

<div
  id="canvas"
  contenteditable="true"
  spellcheck="false"
  data-placeholder="Start typing…"
></div>

<div id="controls">
  <div class="panel">
    <div class="panel-top">
      <select id="typeface-select"><option value="">Loading…</option></select>
      <button id="pangram-btn"><svg width="17" height="20" viewBox="0 0 17 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10.4182 14H15.4182V19M6.41824 6H1.41824V1M15.8358 7.0034C15.2751 5.61566 14.3364 4.41304 13.1262 3.53223C11.9161 2.65141 10.4834 2.12752 8.9905 2.02051C7.4976 1.9135 6.0043 2.2274 4.68093 2.92661C3.35756 3.62582 2.25706 4.68254 1.50417 5.97612M1.00027 12.9971C1.56095 14.3848 2.4997 15.5874 3.70981 16.4682C4.91992 17.3491 6.35412 17.8723 7.84701 17.9793C9.33991 18.0863 10.832 17.7725 12.1554 17.0732C13.4787 16.374 14.5785 15.3175 15.3314 14.0239" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
    <div class="slider-row">
      <span class="slider-label">Size</span>
      <input class="slider" type="range" id="size" min="8" max="200" value="150" step="1" />
      <span class="slider-value" id="size-val">64 pt</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Leading</span>
      <input class="slider" type="range" id="leading" min="50" max="200" value="120" step="1" />
      <span class="slider-value" id="leading-val">120 %</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Spacing</span>
      <input class="slider" type="range" id="spacing" min="-10" max="30" value="0" step="1" />
      <span class="slider-value" id="spacing-val">0 %</span>
    </div>
  </div>
</div>

<script>
  let fonts = [];
  const canvas = document.getElementById('canvas');

  async function init() {
    try {
      const res = await fetch('./fonts.json');
      fonts = await res.json();
    } catch { fonts = []; }

    if (fonts.length) {
      const style = document.createElement('style');
      style.textContent = fonts.map(f =>
        `@font-face { font-family: "${f.name}"; src: url("./fonts/${encodeURIComponent(f.file)}"); }`
      ).join('\n');
      document.head.appendChild(style);
    }

    const sel = document.getElementById('typeface-select');
    sel.innerHTML = '';
    fonts.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f.name;
      opt.textContent = f.name;
      sel.appendChild(opt);
    });
    if (fonts.length) sel.value = fonts[0].name;

    applyStyles();
    lastPangram = Math.floor(Math.random() * PANGRAMS.length);
    canvas.innerText = PANGRAMS[lastPangram];
    canvas.focus();
  }

  function applyStyles() {
    const face    = document.getElementById('typeface-select').value;
    const size    = parseInt(document.getElementById('size').value);
    const leading = parseInt(document.getElementById('leading').value);
    const spacing = parseInt(document.getElementById('spacing').value);

    canvas.style.fontFamily    = `"${face}", serif`;
    canvas.style.fontSize      = size + 'px';
    canvas.style.lineHeight    = (leading / 100).toFixed(2);
    canvas.style.letterSpacing = (spacing / 100).toFixed(3) + 'em';

    document.getElementById('size-val').textContent    = size + ' pt';
    document.getElementById('leading-val').textContent = leading + ' %';
    document.getElementById('spacing-val').textContent = spacing + ' %';
  }

  const PANGRAMS = [
    'ideas are like fish',
    'life is very very complicated',
    'read read read read read',
    'i think in pictures',
    'the work is mysterious and important',
    'please enjoy each fact equally',
    'bing bop boom boom boom bop bam',
    'sometimes i get emotional over fonts',
    'yesyesyesyes',
    "i don't give a flying fuck about fonts",
    "i don't remember it being this far",
    'better never than late',
    'the reward for good work is more work',
    'the darkest cowboy in town',
    'almost good enough',
    "don't talk about my moms yo",
    'meet you at the afas dome',
    'winter miles summer smiles',
    'the spice must flow',
    'i feel kinda freeee',
    "they don't understand the things i say on twitter",
    "i'm the sausage man",
    "when you're a ant and you wake up in an awesome mood about to drive your son to school only to discover that you left the lights on in the car last night so your battery is drained",
    "what's your day rate",
    'run',
    'try linkedin premium for free',
    'was this answer helpful',
    'teamleader is the enemy',
    'aabbccddeeffgghhiijjkkllmmnnooppqqrrssttuuvvwwxxyyzz',
    "i won't read your strategy",
    'pay me bolo',
    'time to boil the ocean',
    "idk i'm no dentist",
    'crop of the century',
    'always be committing',
    'one right here one right here',
    "er zijn ook geen dino's meer en die waren super sterk",
    'gas chamber for the blue raspberry chicken',
    'what if i do a freelance piece in your bedroom',
    'belastingsaangifte',
  ];
  let lastPangram = -1;

  document.getElementById('pangram-btn').addEventListener('click', () => {
    let idx;
    do { idx = Math.floor(Math.random() * PANGRAMS.length); } while (idx === lastPangram);
    lastPangram = idx;
    canvas.innerText = PANGRAMS[idx];
  });

  canvas.addEventListener('keydown', (e) => {
    if (e.key.length === 1 && !/^[a-z ]$/i.test(e.key)) {
      e.preventDefault();
    }
  });

  document.getElementById('typeface-select').addEventListener('change', applyStyles);
  document.getElementById('size').addEventListener('input', applyStyles);
  document.getElementById('leading').addEventListener('input', applyStyles);
  document.getElementById('spacing').addEventListener('input', applyStyles);

  init();
</script>
</body>
</html>
