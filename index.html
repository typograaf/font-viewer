<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Font Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #333;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #7c6af7;
      --accent-hover: #9b8fff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-left: auto;
    }

    .size-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    input[type="range"] {
      accent-color: var(--accent);
      width: 100px;
    }

    .filter-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      width: 180px;
    }

    .filter-input:focus { border-color: var(--accent); }

    select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    select:focus { border-color: var(--accent); }

    .preview-bar {
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .preview-bar textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 15px;
      resize: none;
      outline: none;
      font-family: system-ui, sans-serif;
      line-height: 1.5;
    }

    .preview-bar textarea::placeholder { color: var(--muted); }

    .font-count {
      font-size: 12px;
      color: var(--muted);
      padding: 10px 32px;
    }

    .font-grid {
      display: flex;
      flex-direction: column;
      flex: 1;
      padding: 0 32px 32px;
      gap: 2px;
    }

    .font-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .font-card:hover { border-color: var(--accent); background: var(--surface2); }
    .font-card.active { border-color: var(--accent); background: var(--surface2); }

    .font-meta {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .font-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .font-category {
      font-size: 11px;
      color: var(--border);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .font-preview {
      line-height: 1.3;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .detail-panel {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 420px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 100;
      overflow-y: auto;
    }

    .detail-panel.open { transform: translateX(0); }

    .detail-panel h2 { font-size: 20px; font-weight: 600; }
    .detail-panel .detail-category { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .close-btn:hover { background: var(--border); color: var(--text); }

    .detail-type-area {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      min-height: 120px;
    }

    .detail-type-area [contenteditable] {
      outline: none;
      line-height: 1.5;
      min-height: 80px;
      display: block;
    }

    .detail-size-control {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .detail-size-control input[type="range"] { flex: 1; }

    .alphabet-section h3 {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .alphabet-block {
      line-height: 1.8;
      word-break: break-all;
    }

    .loading {
      padding: 60px 32px;
      text-align: center;
      color: var(--muted);
    }

    .error-msg {
      background: #2a1515;
      border: 1px solid #5a2020;
      color: #ff8080;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      margin: 16px 32px;
    }
  </style>
</head>
<body>

<header>
  <h1>Font Viewer</h1>
  <div class="controls">
    <input class="filter-input" type="text" id="search" placeholder="Search fonts..." />
    <select id="category-filter">
      <option value="">All categories</option>
    </select>
    <div class="size-control">
      <span>Size</span>
      <input type="range" id="font-size" min="12" max="72" value="32" />
      <span id="size-label">32px</span>
    </div>
  </div>
</header>

<div class="preview-bar">
  <textarea id="preview-text" rows="2" placeholder="Type something to preview all fonts...">The quick brown fox jumps over the lazy dog</textarea>
</div>

<div class="font-count" id="font-count"></div>
<div class="font-grid" id="font-grid"><div class="loading">Loading fonts...</div></div>

<div class="detail-panel" id="detail-panel">
  <button class="close-btn" id="close-detail">✕</button>
  <div>
    <div class="detail-category" id="detail-category"></div>
    <h2 id="detail-name"></h2>
  </div>
  <div class="detail-size-control">
    <span>Size</span>
    <input type="range" id="detail-font-size" min="12" max="120" value="48" />
    <span id="detail-size-label">48px</span>
  </div>
  <div class="detail-type-area">
    <div contenteditable="true" id="detail-typing" spellcheck="false"></div>
  </div>
  <div class="alphabet-section">
    <h3>Uppercase</h3>
    <div class="alphabet-block" id="detail-upper"></div>
  </div>
  <div class="alphabet-section">
    <h3>Lowercase</h3>
    <div class="alphabet-block" id="detail-lower"></div>
  </div>
  <div class="alphabet-section">
    <h3>Numerals &amp; Punctuation</h3>
    <div class="alphabet-block" id="detail-misc"></div>
  </div>
</div>

<script>
  const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const LOWER = 'abcdefghijklmnopqrstuvwxyz';
  const MISC  = '0123456789 !@#$%&*()[]{}.,;:\'"?/\\-_=+';

  let fonts = [];
  let activeFont = null;

  // Load fonts.json and inject @font-face rules
  async function loadFonts() {
    try {
      const res = await fetch('./fonts.json');
      if (!res.ok) throw new Error('Could not load fonts.json');
      fonts = await res.json();
    } catch (e) {
      document.getElementById('font-grid').innerHTML =
        `<div class="error-msg">Failed to load fonts.json: ${e.message}</div>`;
      return;
    }

    const style = document.createElement('style');
    style.textContent = fonts.map(f =>
      `@font-face { font-family: "${f.name}"; src: url("./fonts/${f.file}"); }`
    ).join('\n');
    document.head.appendChild(style);

    populateCategoryFilter();
    renderGrid(fonts);
  }

  function populateCategoryFilter() {
    const cats = [...new Set(fonts.map(f => f.category).filter(Boolean))].sort();
    const sel = document.getElementById('category-filter');
    cats.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      sel.appendChild(opt);
    });
  }

  function renderGrid(list) {
    const previewText = document.getElementById('preview-text').value || 'The quick brown fox jumps over the lazy dog';
    const size = document.getElementById('font-size').value;
    const grid = document.getElementById('font-grid');
    document.getElementById('font-count').textContent = `${list.length} font${list.length !== 1 ? 's' : ''}`;

    if (list.length === 0) {
      grid.innerHTML = '<div class="loading">No fonts match your search.</div>';
      return;
    }

    grid.innerHTML = '';
    list.forEach(f => {
      const card = document.createElement('div');
      card.className = 'font-card' + (activeFont?.name === f.name ? ' active' : '');
      card.innerHTML = `
        <div class="font-meta">
          <span class="font-name">${f.name}</span>
          ${f.category ? `<span class="font-category">${f.category}</span>` : ''}
        </div>
        <div class="font-preview" style="font-family:'${f.name}',serif; font-size:${size}px">${escHtml(previewText)}</div>
      `;
      card.addEventListener('click', () => openDetail(f));
      grid.appendChild(card);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function filtered() {
    const q = document.getElementById('search').value.toLowerCase();
    const cat = document.getElementById('category-filter').value;
    return fonts.filter(f =>
      (!q || f.name.toLowerCase().includes(q)) &&
      (!cat || f.category === cat)
    );
  }

  function openDetail(f) {
    activeFont = f;
    const panel = document.getElementById('detail-panel');
    panel.classList.add('open');

    document.getElementById('detail-name').textContent = f.name;
    document.getElementById('detail-category').textContent = f.category || '';

    const sz = document.getElementById('detail-font-size').value;
    const typing = document.getElementById('detail-typing');
    typing.style.fontFamily = `'${f.name}', serif`;
    typing.style.fontSize = sz + 'px';
    if (!typing.textContent) typing.textContent = 'Type here...';

    ['detail-upper','detail-lower','detail-misc'].forEach((id, i) => {
      const el = document.getElementById(id);
      el.style.fontFamily = `'${f.name}', serif`;
      el.style.fontSize = sz + 'px';
      el.textContent = [UPPER, LOWER, MISC][i];
    });

    // highlight active card
    document.querySelectorAll('.font-card').forEach(c => c.classList.remove('active'));
    const cards = document.querySelectorAll('.font-card');
    const idx = filtered().findIndex(x => x.name === f.name);
    if (cards[idx]) cards[idx].classList.add('active');
  }

  // Events
  document.getElementById('preview-text').addEventListener('input', () => renderGrid(filtered()));
  document.getElementById('font-size').addEventListener('input', function() {
    document.getElementById('size-label').textContent = this.value + 'px';
    renderGrid(filtered());
  });
  document.getElementById('search').addEventListener('input', () => renderGrid(filtered()));
  document.getElementById('category-filter').addEventListener('change', () => renderGrid(filtered()));

  document.getElementById('detail-font-size').addEventListener('input', function() {
    const sz = this.value + 'px';
    document.getElementById('detail-size-label').textContent = sz;
    document.getElementById('detail-typing').style.fontSize = sz;
    ['detail-upper','detail-lower','detail-misc'].forEach(id => {
      document.getElementById(id).style.fontSize = sz;
    });
  });

  document.getElementById('close-detail').addEventListener('click', () => {
    document.getElementById('detail-panel').classList.remove('open');
    activeFont = null;
    document.querySelectorAll('.font-card').forEach(c => c.classList.remove('active'));
  });

  loadFonts();
</script>
</body>
</html>
