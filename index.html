<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Font Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #000;
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar: typeface only ── */
    #topbar {
      height: 40px;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      padding: 0 20px;
      flex-shrink: 0;
    }

    #typeface-select {
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      font-size: 13px;
      border: none;
      outline: none;
      background: transparent;
      color: #000;
      cursor: pointer;
    }

    /* ── Canvas ── */
    #canvas {
      flex: 1;
      padding: 60px 80px;
      outline: none;
      white-space: pre-wrap;
      word-break: break-word;
      caret-color: #000;
      overflow-y: auto;
    }

    #canvas:empty::before {
      content: attr(data-placeholder);
      color: #ccc;
      pointer-events: none;
    }

    /* ── Control panel ── */
    #controls {
      flex-shrink: 0;
      padding: 20px 24px 24px;
      display: flex;
      justify-content: center;
    }

    .panel {
      background: #F0F000;
      border-radius: 14px;
      padding: 14px 20px;
      width: 480px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slider-row {
      display: grid;
      grid-template-columns: 72px 1fr 64px;
      align-items: center;
      gap: 12px;
    }

    .slider-label {
      font-size: 14px;
      font-weight: 400;
      color: #000;
      white-space: nowrap;
    }

    /* Custom range slider */
    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 1px;
      background: #000;
      outline: none;
      border: none;
      cursor: pointer;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #000;
      cursor: pointer;
    }

    .slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #000;
      border: none;
      cursor: pointer;
    }

    .slider-value {
      font-size: 14px;
      color: #000;
      text-align: right;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div id="topbar">
  <select id="typeface-select"><option value="">Loading…</option></select>
</div>

<div
  id="canvas"
  contenteditable="true"
  spellcheck="false"
  data-placeholder="Start typing…"
></div>

<div id="controls">
  <div class="panel">
    <div class="slider-row">
      <span class="slider-label">Size</span>
      <input class="slider" type="range" id="size" min="8" max="200" value="64" step="1" />
      <span class="slider-value" id="size-val">64 pt</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Leading</span>
      <input class="slider" type="range" id="leading" min="50" max="200" value="120" step="1" />
      <span class="slider-value" id="leading-val">120 %</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Spacing</span>
      <input class="slider" type="range" id="spacing" min="-10" max="30" value="0" step="1" />
      <span class="slider-value" id="spacing-val">0 %</span>
    </div>
  </div>
</div>

<script>
  let fonts = [];
  const canvas = document.getElementById('canvas');

  async function init() {
    try {
      const res = await fetch('./fonts.json');
      fonts = await res.json();
    } catch { fonts = []; }

    if (fonts.length) {
      const style = document.createElement('style');
      style.textContent = fonts.map(f =>
        `@font-face { font-family: "${f.name}"; src: url("./fonts/${encodeURIComponent(f.file)}"); }`
      ).join('\n');
      document.head.appendChild(style);
    }

    const sel = document.getElementById('typeface-select');
    sel.innerHTML = '';
    fonts.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f.name;
      opt.textContent = f.name;
      sel.appendChild(opt);
    });
    if (fonts.length) sel.value = fonts[0].name;

    applyStyles();
    canvas.focus();
  }

  function applyStyles() {
    const face    = document.getElementById('typeface-select').value;
    const size    = parseInt(document.getElementById('size').value);
    const leading = parseInt(document.getElementById('leading').value);
    const spacing = parseInt(document.getElementById('spacing').value);

    canvas.style.fontFamily    = `"${face}", serif`;
    canvas.style.fontSize      = size + 'px';
    canvas.style.lineHeight    = (leading / 100).toFixed(2);
    canvas.style.letterSpacing = (spacing / 100).toFixed(3) + 'em';

    document.getElementById('size-val').textContent    = size + ' pt';
    document.getElementById('leading-val').textContent = leading + ' %';
    document.getElementById('spacing-val').textContent = spacing + ' %';
  }

  document.getElementById('typeface-select').addEventListener('change', applyStyles);
  document.getElementById('size').addEventListener('input', applyStyles);
  document.getElementById('leading').addEventListener('input', applyStyles);
  document.getElementById('spacing').addEventListener('input', applyStyles);

  init();
</script>
</body>
</html>
