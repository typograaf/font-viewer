<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Font Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #000;
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #typeface-select {
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      font-size: 20px;
      border: none;
      outline: none;
      background: transparent;
      color: #000;
      cursor: pointer;
      width: 100%;
    }

    /* ── Canvas ── */
    #canvas {
      flex: 1;
      padding: 60px 80px;
      outline: none;
      white-space: pre-wrap;
      word-break: break-word;
      caret-color: #000;
      overflow-y: auto;
    }

    #canvas:empty::before {
      content: attr(data-placeholder);
      color: #ccc;
      pointer-events: none;
    }

    /* ── Control panel ── */
    #controls {
      flex-shrink: 0;
      padding: 20px 24px 24px;
      display: flex;
      justify-content: center;
    }

    .panel {
      background: #F0F000;
      border-radius: 14px;
      padding: 14px 20px;
      width: 480px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slider-row {
      display: grid;
      grid-template-columns: 90px 1fr 72px;
      align-items: center;
      gap: 12px;
    }

    .slider-label {
      font-size: 20px;
      font-weight: 400;
      color: #000;
      white-space: nowrap;
    }

    /* Custom range slider */
    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 1px;
      background: #000;
      outline: none;
      border: none;
      cursor: pointer;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #000;
      cursor: pointer;
    }

    .slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #000;
      border: none;
      cursor: pointer;
    }

    .slider-value {
      font-size: 20px;
      color: #000;
      text-align: right;
      white-space: nowrap;
    }

    .panel-top {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(0,0,0,0.15);
      margin-bottom: 2px;
    }

    #pangram-btn {
      font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      font-size: 20px;
      background: none;
      border: none;
      cursor: pointer;
      color: #000;
      padding: 0;
      opacity: 0.4;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    #pangram-btn:hover { opacity: 1; }
  </style>
</head>
<body>

<div
  id="canvas"
  contenteditable="true"
  spellcheck="false"
  data-placeholder="Start typing…"
></div>

<div id="controls">
  <div class="panel">
    <div class="panel-top">
      <select id="typeface-select"><option value="">Loading…</option></select>
      <button id="pangram-btn" title="Random pangram">&#x21BA;</button>
    </div>
    <div class="slider-row">
      <span class="slider-label">Size</span>
      <input class="slider" type="range" id="size" min="8" max="200" value="64" step="1" />
      <span class="slider-value" id="size-val">64 pt</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Leading</span>
      <input class="slider" type="range" id="leading" min="50" max="200" value="120" step="1" />
      <span class="slider-value" id="leading-val">120 %</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Spacing</span>
      <input class="slider" type="range" id="spacing" min="-10" max="30" value="0" step="1" />
      <span class="slider-value" id="spacing-val">0 %</span>
    </div>
  </div>
</div>

<script>
  let fonts = [];
  const canvas = document.getElementById('canvas');

  async function init() {
    try {
      const res = await fetch('./fonts.json');
      fonts = await res.json();
    } catch { fonts = []; }

    if (fonts.length) {
      const style = document.createElement('style');
      style.textContent = fonts.map(f =>
        `@font-face { font-family: "${f.name}"; src: url("./fonts/${encodeURIComponent(f.file)}"); }`
      ).join('\n');
      document.head.appendChild(style);
    }

    const sel = document.getElementById('typeface-select');
    sel.innerHTML = '';
    fonts.forEach(f => {
      const opt = document.createElement('option');
      opt.value = f.name;
      opt.textContent = f.name;
      sel.appendChild(opt);
    });
    if (fonts.length) sel.value = fonts[0].name;

    applyStyles();
    canvas.focus();
  }

  function applyStyles() {
    const face    = document.getElementById('typeface-select').value;
    const size    = parseInt(document.getElementById('size').value);
    const leading = parseInt(document.getElementById('leading').value);
    const spacing = parseInt(document.getElementById('spacing').value);

    canvas.style.fontFamily    = `"${face}", serif`;
    canvas.style.fontSize      = size + 'px';
    canvas.style.lineHeight    = (leading / 100).toFixed(2);
    canvas.style.letterSpacing = (spacing / 100).toFixed(3) + 'em';

    document.getElementById('size-val').textContent    = size + ' pt';
    document.getElementById('leading-val').textContent = leading + ' %';
    document.getElementById('spacing-val').textContent = spacing + ' %';
  }

  const PANGRAMS = [
    'The quick brown fox jumps over the lazy dog.',
    'Pack my box with five dozen liquor jugs.',
    'How vexingly quick daft zebras jump!',
    'The five boxing wizards jump quickly.',
    'Sphinx of black quartz, judge my vow.',
    'Waltz, bad nymph, for quick jigs vex.',
    'Bright vixens jump; dozy fowl quack.',
    'Jackdaws love my big sphinx of quartz.',
    'Fix problem quickly with galvanized jets.',
    'Jumpy halfling dwarves pick quartz box.',
  ];
  let lastPangram = -1;

  document.getElementById('pangram-btn').addEventListener('click', () => {
    let idx;
    do { idx = Math.floor(Math.random() * PANGRAMS.length); } while (idx === lastPangram);
    lastPangram = idx;
    canvas.innerText = PANGRAMS[idx];
  });

  document.getElementById('typeface-select').addEventListener('change', applyStyles);
  document.getElementById('size').addEventListener('input', applyStyles);
  document.getElementById('leading').addEventListener('input', applyStyles);
  document.getElementById('spacing').addEventListener('input', applyStyles);

  init();
</script>
</body>
</html>
