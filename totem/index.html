<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TOTEM® — brand guidelines</title>
<style>
  /* Drop the real font file at fonts/DrukWide-Bold.woff2 for an exact match. */
  @font-face {
    font-family: "Druk Wide Bold";
    src: url("fonts/DrukWide-Bold.woff2") format("woff2"),
         url("fonts/DrukWide-Bold.woff") format("woff");
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #fff;
    color: #111;
    -webkit-font-smoothing: antialiased;
  }

  /* Figma label style: Druk Wide Bold, 12px, #9f9f9f, 0.12px tracking,
     0.9 leading, uppercase, trimmed to cap height (vertical crop). */
  .label {
    font-family: "Druk Wide Bold", "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    font-size: 12px;
    line-height: 0.9;
    letter-spacing: 0.12px;
    text-transform: uppercase;
    color: #9f9f9f;
    white-space: nowrap;
    word-break: break-word;
    text-box-trim: trim-both;
    text-box-edge: cap alphabetic;
    text-box: trim-both cap alphabetic;
  }
  .label p { position: relative; flex-shrink: 0; }

  /* ---------- HUB ---------- */
  .hub {
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 24px;
    align-items: flex-start;
    padding: 48px;
  }
  .hub-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }
  .hub-top .center { text-align: center; }

  .grid {
    display: flex;
    flex-wrap: wrap;
    align-content: stretch;   /* rows stretch to fill viewport height */
    align-items: stretch;
    row-gap: 6px;
    column-gap: 21px;
    flex: 1 0 0;
    min-height: 0;
    width: 100%;
  }
  .card {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 510px;
    min-height: 0;
    flex: 1 0 0;
    border: none;
    background: none;
    padding: 0;
    text-align: left;
    cursor: pointer;
    font: inherit;
  }
  .card .thumb {
    flex: 1 0 0;
    min-height: 0;
    width: 100%;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    background: #f0f0f0;
  }
  .card .thumb img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .card:hover .thumb img { transform: scale(1.035); }

  .card .meta {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    width: 100%;
    padding: 0 24px;
    transition: color 0.25s ease;
  }
  .card:hover .meta { color: #111; }

  @media (max-width: 560px) {
    .hub { padding: 20px; height: auto; overflow: visible; }
    .card { min-width: 100%; height: 62vh; }
  }

  /* ---------- PAGE (viewer) ---------- */
  .viewer {
    position: fixed;
    inset: 0;
    background: #fff;
    display: none;
    flex-direction: column;
    gap: 24px;
    padding: 48px;
    z-index: 100;
  }
  .viewer.open { display: flex; }
  .viewer-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0 24px;
  }
  .viewer-top .back {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    font: inherit;            /* buttons don't inherit font-family */
    color: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
  }
  .viewer-top .back:hover { color: #111; }
  .viewer-top .ids {
    display: flex;
    align-items: center;
    gap: 48px;
  }
  .viewer-top .ids a { color: inherit; text-decoration: none; }
  .viewer-top .ids a:hover { color: #111; }

  .stage {
    flex: 1 0 0;
    min-height: 0;
    width: 100%;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    background: #fff;
  }
  .stage iframe {
    position: absolute;
    /* Oversize by 1px each side so Figma's own canvas border is clipped
       off by the overflow-hidden stage (kills the hairline on right/bottom). */
    inset: -1px;
    width: calc(100% + 2px);
    height: calc(100% + 2px);
    border: none;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s ease;
  }
  .stage iframe.active { opacity: 1; pointer-events: auto; }

  @media (max-width: 560px) {
    .viewer { padding: 20px; gap: 14px; }
    .viewer-top { padding: 0; }
    .viewer-top .ids { gap: 18px; }
  }
</style>
</head>
<body>

  <div class="hub">
    <div class="hub-top label">
      <p>TOTEM&reg;</p>
      <p>brand guidelines</p>
      <p class="center">SCO</p>
    </div>
    <main class="grid" id="grid"></main>
  </div>

  <div class="viewer" id="viewer">
    <div class="viewer-top label">
      <button class="back" id="backBtn">Back to overview</button>
      <div class="ids">
        <p id="vProduct"></p>
        <p id="vName"></p>
        <a id="vYear" target="_blank" rel="noopener"></a>
      </div>
    </div>
    <div class="stage" id="stage"></div>
  </div>

<script src="presentations.js"></script>
<script>
  // Convert a normal Figma share link into a lean, fast-loading embed.
  function toEmbed(url) {
    try {
      const u = new URL(url);
      u.hostname = "embed.figma.com";
      u.searchParams.delete("viewport");
      u.searchParams.delete("t");
      u.searchParams.delete("scaling");
      u.searchParams.delete("content-scaling");
      u.searchParams.set("scaling", "scale-down-width");
      u.searchParams.set("embed-host", "share");
      u.searchParams.set("hide-ui", "1");
      return u.toString();
    } catch (e) { return url; }
  }

  const items = window.PRESENTATIONS || [];
  const grid = document.getElementById("grid");
  const viewer = document.getElementById("viewer");
  const stage = document.getElementById("stage");
  const vProduct = document.getElementById("vProduct");
  const vName = document.getElementById("vName");
  const vYear = document.getElementById("vYear");

  // One iframe per presentation, pre-loaded in the background so a click
  // reveals an already-rendered presentation.
  const frames = items.map((p) => {
    const f = document.createElement("iframe");
    f.setAttribute("allowfullscreen", "");
    f.setAttribute("referrerpolicy", "no-referrer-when-downgrade");
    f.dataset.src = toEmbed(p.url);
    // Focus the embed as soon as it's ready so arrow keys reach Figma
    // without a click (cross-origin: focus is the only way in).
    f.addEventListener("load", () => {
      if (f.classList.contains("active")) focusActive();
    });
    stage.appendChild(f);
    return f;
  });
  function load(i) {
    const f = frames[i];
    if (f && !f.src) f.src = f.dataset.src;
  }

  // Move keyboard focus into the visible embed so Figma captures arrow keys.
  function focusActive() {
    const f = frames.find((fr) => fr.classList.contains("active"));
    if (!f) return;
    try { f.focus({ preventScroll: true }); } catch (e) { f.focus(); }
  }
  // Re-grab focus whenever the cursor is over the presentation.
  stage.addEventListener("pointerenter", focusActive);
  stage.addEventListener("pointerdown", focusActive);

  items.forEach((p, i) => {
    const card = document.createElement("button");
    card.className = "card";
    card.innerHTML = `
      <span class="thumb"><img src="${p.image}" alt="${p.product}" loading="lazy" /></span>
      <span class="meta label">
        <p>${p.product}</p>
        <p>${p.name}</p>
        <p>${p.year}</p>
      </span>`;
    card.addEventListener("click", () => open(i));
    grid.appendChild(card);
  });

  function open(i) {
    const p = items[i];
    load(i);
    frames.forEach((f, j) => f.classList.toggle("active", j === i));
    vProduct.textContent = p.product;
    vName.textContent = p.name;
    vYear.textContent = p.year;
    vYear.href = p.url;
    viewer.classList.add("open");
    location.hash = "v" + i;
    // Retry focus a few times — the embed needs a moment before it accepts keys.
    [0, 120, 400, 900].forEach((t) => setTimeout(focusActive, t));
  }
  function close() {
    viewer.classList.remove("open");
    frames.forEach((f) => f.classList.remove("active"));
    if (location.hash) history.replaceState(null, "", location.pathname);
  }
  document.getElementById("backBtn").addEventListener("click", close);
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && viewer.classList.contains("open")) close();
  });

  // Eager-load everything, staggered so embeds don't all hammer at once.
  window.addEventListener("load", () => {
    items.forEach((_, i) => setTimeout(() => load(i), i * 1500));
  });

  // Deep-link support: #v0, #v1, ...
  const m = location.hash.match(/^#v(\d+)$/);
  if (m && items[+m[1]]) open(+m[1]);
</script>
</body>
</html>
